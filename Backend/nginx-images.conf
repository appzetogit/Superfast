server {
    # Replace with your actual domain or remove if included in the main server block
    # server_name api.domain.com;
    
    # ----------------------------------------------------------------------
    # VPS Image Storage Serving Configuration (Nginx + Flutter Mobile/Web App CORS)
    # ----------------------------------------------------------------------
    location ^~ /images/ {
        # Point to the base directory of your VPS storage
        # The URL /images/menu/... will map to /var/storage/menu/...
        alias /var/storage/;
        
        # Enable CORS for Flutter mobile/web apps (Android, iOS, Web)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        
        # Performance: aggressively cache images in the browser/mobile app
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        
        # Block direct access to any non-image script/log files
        location ~* \.(txt|log|sh|php|js|json|env)$ {
            deny all;
        }

        # Attempt to serve the file directly using alias mapping
        try_files $uri $uri/ =404;
    }
}
