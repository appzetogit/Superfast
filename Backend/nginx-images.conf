server {
    # Replace with your actual domain or remove if included in the main server block
    # server_name api.domain.com;
    
    # ----------------------------------------------------------------------
    # VPS Image Storage Serving Configuration
    # ----------------------------------------------------------------------
    location /images/ {
        # Point to the base directory of your VPS storage
        # The URL /images/menu/... will map to /var/storage/menu/...
        alias /var/storage/;
        
        # Security: Allow only safe image extensions
        location ~* \.(jpg|jpeg|png|webp)$ {
            # Enable CORS if images are requested from your frontend domain
            add_header Access-Control-Allow-Origin "*";
            
            # Performance: aggressively cache images in the browser
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            
            # Security headers
            add_header X-Content-Type-Options "nosniff";
            
            # Attempt to serve the file, return 404 if not found
            try_files $uri =404;
        }

        # Block direct access to any other files in the storage directory
        location ~* \.(txt|log|sh|php|js|json)$ {
            deny all;
        }

        # Fallback for paths that don't match the regex above
        try_files $uri =404;
    }
}
