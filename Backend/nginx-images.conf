server {
    # Include your server_name and port listening if inside a main block
    # listen 80;
    # listen 443 ssl;
    # server_name superfastfood.in;

    # ----------------------------------------------------------------------
    # VPS Image Storage Serving Configuration (Nginx + Flutter / Web CORS)
    # ----------------------------------------------------------------------
    location ^~ /images/ {
        # Make sure this points to your EXACT backend images/uploads directory (with trailing slash)
        alias /root/superfast/Backend/uploads/; 
        
        # Correct handling for alias + static file serving
        try_files $request_filename =404;

        # Enable CORS for Mobile/Web clients
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        
        # Performance & Caching
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        
        # Security: Prevent executing scripts or viewing sensitive extensions
        location ~* \.(txt|log|sh|php|js|json|env)$ {
            deny all;
        }
    }

    # Handle /uploads/ path for backward compatibility with older database links
    location ^~ /uploads/ {
        alias /root/superfast/Backend/uploads/;
        try_files $request_filename =404;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept" always;
        add_header Cross-Origin-Resource-Policy "cross-origin" always;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
}